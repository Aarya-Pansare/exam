<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f7f4ef;
      color: #333;
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #ffb703;
      padding: 20px;
      color: white;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      font-size: 28px;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      margin: 18px 0;
      cursor: pointer;
      transition: 0.3s;
    }

    .sidebar ul li:hover {
      transform: translateX(5px);
    }

    .main {
      flex: 1;
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 36px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #fb8500;
    }

    .card p {
      font-size: 24px;
      font-weight: bold;
    }

    .cat-section {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .cat-card {
      background: #fff7e6;
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
      padding-bottom: 15px;
    }

    .cat-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .cat-card h4 {
      margin: 10px 0 5px;
    }

    .cat-card span {
      color: #777;
      font-size: 14px;
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>🐱 CatBoard</h2>
    <ul>
      <li>🏠 Dashboard</li>
      <li>🐾 Cats</li>
      <li>🍖 Feeding</li>
      <li>🧸 Toys</li>
      <li>⚙ Settings</li>
    </ul>
  </div>

  <div class="main">
    <div class="header">
      <h1>Cat Dashboard</h1>
      <button style="padding:10px 18px; border:none; border-radius:10px; background:#fb8500; color:white; cursor:pointer;">
        Add Cat
      </button>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Total Cats</h3>
        <p>12</p>
      </div>

      <div class="card">
        <h3>Fed Today</h3>
        <p>10</p>
      </div>

      <div class="card">
        <h3>Toys Available</h3>
        <p>24</p>
      </div>

      <div class="card">
        <h3>Vet Visits</h3>
        <p>3</p>
      </div>
    </div>

    <div class="cat-section">
      <h2>Featured Cats</h2>

      <div class="cat-grid">
        <div class="cat-card">
          <img src="https://placekitten.com/300/200" alt="Cat">
          <h4>Milo</h4>
          <span>British Shorthair</span>
        </div>

        <div class="cat-card">
          <img src="https://placekitten.com/301/200" alt="Cat">
          <h4>Luna</h4>
          <span>Siamese</span>
        </div>

        <div class="cat-card">
          <img src="https://placekitten.com/302/200" alt="Cat">
          <h4>Oliver</h4>
          <span>Maine Coon</span>
        </div>

        <div class="cat-card">
          <img src="https://placekitten.com/303/200" alt="Cat">
          <h4>Bella</h4>
          <span>Persian</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>🐾 Cat Dashboard UI • HTML + CSS</p>
    </div>
  </div>
</body>
</html>
